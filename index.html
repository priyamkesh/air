<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Air Canvas - Draw with your Finger</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #1a1a1a;
            color: white;
            font-family: sans-serif;
            margin-top: 20px;
        }
        .canvas-container {
            position: relative;
            width: 640px;
            height: 480px;
            border: 4px solid #333;
            border-radius: 8px;
            overflow: hidden;
            /* Flip horizontally so it acts like a mirror */
            transform: scaleX(-1); 
        }
        /* Hide the raw video, we will draw it onto the canvas */
        video {
            display: none;
        }
        /* Stack the drawing canvas directly on top of the video canvas */
        canvas {
            position: absolute;
            top: 0;
            left: 0;
        }
        .instructions {
            margin-top: 15px;
            text-align: center;
        }
    </style>
</head>
<body>

    <h2>☝🏻 Air Drawing Canvas</h2>
    
    <div class="canvas-container">
        <video id="webcam" autoplay playsinline></video>
        <canvas id="videoCanvas" width="640" height="480"></canvas>
        <canvas id="drawCanvas" width="640" height="480"></canvas>
    </div>

    <div class="instructions">
        <p><strong>Point your index finger up (☝🏻) to draw.</strong></p>
        <p>Make a fist or open your hand to stop drawing.</p>
        <button onclick="clearCanvas()" style="padding: 10px; cursor: pointer;">Clear Drawing</button>
    </div>

    <script>
        const videoElement = document.getElementById('webcam');
        const videoCanvas = document.getElementById('videoCanvas');
        const videoCtx = videoCanvas.getContext('2d');
        const drawCanvas = document.getElementById('drawCanvas');
        const drawCtx = drawCanvas.getContext('2d');

        // Drawing settings
        drawCtx.strokeStyle = '#00ff00'; // Neon green ink
        drawCtx.lineWidth = 6;
        drawCtx.lineCap = 'round';

        let lastX = null;
        let lastY = null;

        function clearCanvas() {
            drawCtx.clearRect(0, 0, drawCanvas.width, drawCanvas.height);
        }

        function onResults(results) {
            // 1. Draw the video frame to the bottom canvas
            videoCtx.save();
            videoCtx.clearRect(0, 0, videoCanvas.width, videoCanvas.height);
            videoCtx.drawImage(results.image, 0, 0, videoCanvas.width, videoCanvas.height);
            videoCtx.restore();

            // 2. Check for hand landmarks
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const landmarks = results.multiHandLandmarks[0];

                // MediaPipe gives us 21 points on the hand. 
                // Point 8 is the index finger tip. Point 6 is the middle joint.
                // We check if the tip (8) is physically higher than the joint (6).
                // Note: The Y-axis starts at 0 at the top of the screen and goes down.
                
                const isIndexUp = landmarks[8].y < landmarks[6].y;
                const isMiddleDown = landmarks[12].y > landmarks[10].y;
                const isRingDown = landmarks[16].y > landmarks[14].y;
                const isPinkyDown = landmarks[20].y > landmarks[18].y;

                // The gesture is active ONLY if the index is up and the rest are down
                const isPointing = isIndexUp && isMiddleDown && isRingDown && isPinkyDown;

                if (isPointing) {
                    // Convert normalized coordinates (0 to 1) to canvas pixels
                    const x = landmarks[8].x * drawCanvas.width;
                    const y = landmarks[8].y * drawCanvas.height;

                    if (lastX !== null && lastY !== null) {
                        drawCtx.beginPath();
                        drawCtx.moveTo(lastX, lastY);
                        drawCtx.lineTo(x, y);
                        drawCtx.stroke();
                    }
                    // Update last position
                    lastX = x;
                    lastY = y;
                } else {
                    // Reset the stroke if the user stops pointing
                    lastX = null;
                    lastY = null;
                }
            } else {
                // Reset if no hands are detected
                lastX = null;
                lastY = null;
            }
        }

        // Initialize MediaPipe Hands
        const hands = new Hands({locateFile: (file) => {
            return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
        }});
        
        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 1,
            minDetectionConfidence: 0.6,
            minTrackingConfidence: 0.6
        });
        
        hands.onResults(onResults);

        // Initialize the Webcam
        const camera = new Camera(videoElement, {
            onFrame: async () => {
                await hands.send({image: videoElement});
            },
            width: 640,
            height: 480
        });
        
        camera.start();
    </script>
</body>
</html>
