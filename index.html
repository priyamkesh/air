<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PriAxom</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #0d0d0d;
            color: #00ff00; /* Matching neon green */
            font-family: 'Courier New', Courier, monospace; /* More tech-like font */
            margin-top: 20px;
        }
        .canvas-container {
            position: relative;
            width: 640px;
            height: 480px;
            border: 2px solid #00ff00;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 0 15px #00ff00; /* Glow effect for the container */
            transform: scaleX(-1); /* Acts like a mirror */
        }
        video {
            display: none;
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
        }
        .instructions {
            margin-top: 15px;
            text-align: center;
            color: white;
            font-family: sans-serif;
        }
        h2 {
            text-shadow: 0 0 10px #00ff00;
        }
    </style>
</head>
<body>

    <h2>PriAxom By Priyam Kesh</h2>
    
    <div class="canvas-container">
        <video id="webcam" autoplay playsinline></video>
        <canvas id="videoCanvas" width="640" height="480"></canvas>
        <canvas id="drawCanvas" width="640" height="480"></canvas>
    </div>

    <div class="instructions">
        <p><strong>Point your index finger up (☝🏻) to draw.</strong></p>
        <p>Make a fist or open your hand to stop drawing.</p>
    </div>

    <script>
        const videoElement = document.getElementById('webcam');
        const videoCanvas = document.getElementById('videoCanvas');
        const videoCtx = videoCanvas.getContext('2d');
        const drawCanvas = document.getElementById('drawCanvas');
        const drawCtx = drawCanvas.getContext('2d');

        // Drawing settings: Smaller, glowing lines
        drawCtx.strokeStyle = '#00ff00';
        drawCtx.lineWidth = 3; // Made lines smaller
        drawCtx.lineCap = 'round';
        drawCtx.shadowBlur = 15; // Added neon glow
        drawCtx.shadowColor = '#00ff00';

        let lastX = null;
        let lastY = null;

        function onResults(results) {
            videoCtx.save();
            // Fill background with black (hiding the real video)
            videoCtx.fillStyle = '#000000';
            videoCtx.fillRect(0, 0, videoCanvas.width, videoCanvas.height);

            // Draw the "Robotic" skeletal hand using MediaPipe drawing utils
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const landmarks = results.multiHandLandmarks[0];

                // Draw high-tech cyan/white connections and joints
                drawConnectors(videoCtx, landmarks, HAND_CONNECTIONS, {color: '#00FFFF', lineWidth: 3});
                drawLandmarks(videoCtx, landmarks, {color: '#FFFFFF', lineWidth: 1, radius: 4});

                // Logic to check if only index finger is up
                const isIndexUp = landmarks[8].y < landmarks[6].y;
                const isMiddleDown = landmarks[12].y > landmarks[10].y;
                const isRingDown = landmarks[16].y > landmarks[14].y;
                const isPinkyDown = landmarks[20].y > landmarks[18].y;

                const isPointing = isIndexUp && isMiddleDown && isRingDown && isPinkyDown;

                if (isPointing) {
                    const x = landmarks[8].x * drawCanvas.width;
                    const y = landmarks[8].y * drawCanvas.height;

                    if (lastX !== null && lastY !== null) {
                        drawCtx.beginPath();
                        drawCtx.moveTo(lastX, lastY);
                        drawCtx.lineTo(x, y);
                        drawCtx.stroke();
                    }
                    lastX = x;
                    lastY = y;
                } else {
                    lastX = null;
                    lastY = null;
                }
            } else {
                lastX = null;
                lastY = null;
            }
            videoCtx.restore();
        }

        // Initialize MediaPipe Hands
        const hands = new Hands({locateFile: (file) => {
            return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
        }});
        
        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 1,
            minDetectionConfidence: 0.6,
            minTrackingConfidence: 0.6
        });
        
        hands.onResults(onResults);

        // Initialize the Webcam
        const camera = new Camera(videoElement, {
            onFrame: async () => {
                await hands.send({image: videoElement});
            },
            width: 640,
            height: 480
        });
        
        camera.start();
    </script>
</body>
</html>
