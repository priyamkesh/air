<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PriAxom AIR</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caveat&display=swap" rel="stylesheet">

    <style>
        body { display: flex; flex-direction: column; justify-content: space-between; align-items: stretch; background-color: #000000; height: 100vh; margin: 0; overflow: hidden; font-family: sans-serif; }
        #header { padding: 20px; font-weight: bold; text-align: left; position: absolute; top: 0; left: 0; z-index: 10; }
        #header-main-text { font-size: 1.5em; }
        .header-part1 { background: linear-gradient(to right, #FF00FF, #FF69B4); -webkit-background-clip: text; -webkit-text-fill-color: transparent; } 
        .header-part2 { background: linear-gradient(to right, #00FFFF, #1E90FF); -webkit-background-clip: text; -webkit-text-fill-color: transparent; } 
        #header-copyright { background: linear-gradient(to right, #FF8C00, #FFD700); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-size: 0.8em; margin-top: 5px; width: max-content; }
        .canvas-container { position: relative; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; z-index: 5; }
        video { display: none; }
        canvas { position: absolute; top: 0; left: 0; transform: scaleX(-1); }
        #pointerCanvas { width: 100%; height: 100%; z-index: 6; }
        #drawCanvas { width: 100%; height: 100%; z-index: 7; background-color: transparent; }
        #footer { padding: 20px; width: 100%; text-align: center; font-family: 'Caveat', cursive; font-size: 1.8em; position: absolute; bottom: 0; left: 0; z-index: 10; background: linear-gradient(to right, #8A2BE2, #00BFFF, #00FFFF); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body>

    <div id="header">
        <span id="header-main-text"><span class="header-part1">PriAxom AIR</span> <span class="header-part2">by Priyam Kesh</span></span>
        <div id="header-copyright">Under Strict Copyright</div>
    </div>
    
    <div class="canvas-container">
        <video id="webcam" autoplay playsinline></video>
        <canvas id="pointerCanvas"></canvas>
        <canvas id="drawCanvas"></canvas>
    </div>

    <div id="footer">Draw (☝🏻) • Erase (✌🏻) • Move (🤏🏻)</div>

    <script>
        const videoElement = document.getElementById('webcam');
        const pointerCanvas = document.getElementById('pointerCanvas');
        const pointerCtx = pointerCanvas.getContext('2d');
        const drawCanvas = document.getElementById('drawCanvas');
        const drawCtx = drawCanvas.getContext('2d');

        function resizeCanvases() {
            const container = document.querySelector('.canvas-container');
            pointerCanvas.width = container.offsetWidth;
            pointerCanvas.height = container.offsetHeight;
            drawCanvas.width = container.offsetWidth;
            drawCanvas.height = container.offsetHeight;
        }
        window.addEventListener('resize', resizeCanvases);
        resizeCanvases(); 

        let strokes = []; 
        let handStates = [
            { currentStroke: null, grabbedStrokeIndex: -1, lastPinchPos: null },
            { currentStroke: null, grabbedStrokeIndex: -1, lastPinchPos: null }
        ];

        function onResults(results) {
            pointerCtx.save();
            pointerCtx.fillStyle = '#000000';
            pointerCtx.fillRect(0, 0, pointerCanvas.width, pointerCanvas.height);
            drawCtx.clearRect(0, 0, drawCanvas.width, drawCanvas.height);

            // 1. Process Active Hands
            if (results.multiHandLandmarks) {
                for (let i = 0; i < handStates.length; i++) {
                    const stateObj = handStates[i];

                    // Safely clear state if a hand leaves the frame (Fixes auto-connecting bug)
                    if (i >= results.multiHandLandmarks.length) {
                        stateObj.currentStroke = null;
                        stateObj.grabbedStrokeIndex = -1;
                        stateObj.lastPinchPos = null;
                        continue;
                    }

                    const landmarks = results.multiHandLandmarks[i];

                    drawConnectors(pointerCtx, landmarks, HAND_CONNECTIONS, {color: '#00FFFF', lineWidth: 2});
                    drawLandmarks(pointerCtx, landmarks, {color: '#FFFFFF', lineWidth: 1, radius: 2});

                    const w = drawCanvas.width;
                    const h = drawCanvas.height;
                    const thumbX = landmarks[4].x * w, thumbY = landmarks[4].y * h;
                    const indexX = landmarks[8].x * w, indexY = landmarks[8].y * h;
                    const middleX = landmarks[12].x * w, middleY = landmarks[12].y * h;

                    const isIndexUp = landmarks[8].y < landmarks[6].y;
                    const isMiddleUp = landmarks[12].y < landmarks[10].y;
                    const isRingUp = landmarks[16].y < landmarks[14].y;
                    const isPinkyUp = landmarks[20].y < landmarks[18].y;
                    
                    const pinchDist = Math.hypot(thumbX - indexX, thumbY - indexY);

                    let state = 'idle';
                    if (pinchDist < 40) state = 'pinching';
                    else if (isIndexUp && isMiddleUp && !isRingUp && !isPinkyUp) state = 'erasing';
                    else if (isIndexUp && !isMiddleUp && !isRingUp && !isPinkyUp) state = 'drawing';

                    // EXECUTE: DRAWING
                    if (state === 'drawing') {
                        pointerCtx.fillStyle = '#1E90FF';
                        pointerCtx.beginPath(); pointerCtx.arc(indexX, indexY, 10, 0, Math.PI*2); pointerCtx.fill();

                        if (!stateObj.currentStroke) {
                            stateObj.currentStroke = [{x: indexX, y: indexY}];
                            strokes.push(stateObj.currentStroke);
                        } else {
                            const lastPt = stateObj.currentStroke[stateObj.currentStroke.length - 1];
                            const dist = Math.hypot(indexX - lastPt.x, indexY - lastPt.y);

                            // Anti-Snap logic: If jump is too large, break the line.
                            if (dist > 100) {
                                stateObj.currentStroke = [{x: indexX, y: indexY}];
                                strokes.push(stateObj.currentStroke);
                            } 
                            // Spatial Filtering: Only record point if movement > 4px (Massive Performance Boost)
                            else if (dist > 4) {
                                stateObj.currentStroke.push({x: indexX, y: indexY});
                            }
                        }
                    } else {
                        stateObj.currentStroke = null; 
                    }

                    // EXECUTE: ERASING
                    if (state === 'erasing') {
                        const eraseCenterX = (indexX + middleX) / 2;
                        const eraseCenterY = (indexY + middleY) / 2;
                        const eraseRadius = 30;

                        pointerCtx.fillStyle = '#FF0044';
                        pointerCtx.beginPath(); pointerCtx.arc(eraseCenterX, eraseCenterY, eraseRadius, 0, Math.PI*2); pointerCtx.fill();

                        let newStrokes = [];
                        for (let stroke of strokes) {
                            let currentNewStroke = [];
                            for (let pt of stroke) {
                                if (Math.hypot(pt.x - eraseCenterX, pt.y - eraseCenterY) < eraseRadius) {
                                    if (currentNewStroke.length > 1) newStrokes.push(currentNewStroke);
                                    currentNewStroke = []; 
                                } else {
                                    currentNewStroke.push(pt);
                                }
                            }
                            if (currentNewStroke.length > 1) newStrokes.push(currentNewStroke);
                        }
                        strokes = newStrokes;
                    }

                    // EXECUTE: PINCHING (MOVE)
                    if (state === 'pinching') {
                        const pinchCenterX = (thumbX + indexX) / 2;
                        const pinchCenterY = (thumbY + indexY) / 2;

                        pointerCtx.strokeStyle = '#00FF00'; pointerCtx.lineWidth = 3;
                        pointerCtx.beginPath(); pointerCtx.moveTo(thumbX, thumbY); pointerCtx.lineTo(indexX, indexY); pointerCtx.stroke();
                        pointerCtx.fillStyle = '#00FF00';
                        pointerCtx.beginPath(); pointerCtx.arc(pinchCenterX, pinchCenterY, 8, 0, Math.PI*2); pointerCtx.fill();

                        if (stateObj.grabbedStrokeIndex === -1) {
                            let closestDist = Infinity;
                            let closestIdx = -1;
                            for (let j = 0; j < strokes.length; j++) {
                                for (let pt of strokes[j]) {
                                    let d = Math.hypot(pt.x - pinchCenterX, pt.y - pinchCenterY);
                                    if (d < 60 && d < closestDist) {
                                        closestDist = d;
                                        closestIdx = j;
                                    }
                                }
                            }
                            if (closestIdx !== -1) {
                                stateObj.grabbedStrokeIndex = closestIdx;
                                stateObj.lastPinchPos = { x: pinchCenterX, y: pinchCenterY };
                            }
                        } else {
                            if (stateObj.lastPinchPos && strokes[stateObj.grabbedStrokeIndex]) {
                                let dx = pinchCenterX - stateObj.lastPinchPos.x;
                                let dy = pinchCenterY - stateObj.lastPinchPos.y;
                                for (let pt of strokes[stateObj.grabbedStrokeIndex]) {
                                    pt.x += dx;
                                    pt.y += dy;
                                }
                            }
                            stateObj.lastPinchPos = { x: pinchCenterX, y: pinchCenterY };
                        }
                    } else {
                        stateObj.grabbedStrokeIndex = -1;
                        stateObj.lastPinchPos = null;
                    }
                }
            }
            pointerCtx.restore();

            // 2. High-Performance Curve Rendering (Bezier Curves)
            drawCtx.strokeStyle = '#00FFFF'; 
            drawCtx.lineWidth = 4;           
            drawCtx.lineCap = 'round';
            drawCtx.lineJoin = 'round';
            drawCtx.shadowBlur = 12;
            drawCtx.shadowColor = '#1E90FF';

            for (let stroke of strokes) {
                if (stroke.length < 2) continue;
                drawCtx.beginPath();
                drawCtx.moveTo(stroke[0].x, stroke[0].y);
                
                // Draw perfect mathematical curves between filtered points
                for (let i = 1; i < stroke.length - 1; i++) {
                    const xc = (stroke[i].x + stroke[i + 1].x) / 2;
                    const yc = (stroke[i].y + stroke[i + 1].y) / 2;
                    drawCtx.quadraticCurveTo(stroke[i].x, stroke[i].y, xc, yc);
                }
                // Connect the final point
                drawCtx.lineTo(stroke[stroke.length - 1].x, stroke[stroke.length - 1].y);
                drawCtx.stroke();
            }
        }

        const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
        hands.setOptions({ maxNumHands: 2, modelComplexity: 1, minDetectionConfidence: 0.7, minTrackingConfidence: 0.7 });
        hands.onResults(onResults);

        const camera = new Camera(videoElement, {
            onFrame: async () => { await hands.send({image: videoElement}); },
            width: 640, height: 480
        });
        camera.start();
    </script>
</body>
</html>
