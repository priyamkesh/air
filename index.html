<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PriAxom AI Air Drawing</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caveat&display=swap" rel="stylesheet">

    <style>
        /* Base page styling to match the image design */
        body {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: stretch;
            background-color: #000000; /* Pure black background */
            height: 100vh;
            margin: 0;
            overflow: hidden; /* Prevents scrolling */
        }

        /* Header (Top-Left) styling */
        #header {
            padding: 20px;
            color: white;
            font-family: sans-serif;
            font-weight: bold;
            text-align: left;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 10; /* Ensures header stays on top */
        }

        /* Header multi-color text styling */
        #header-main-text {
            font-size: 1.5em;
        }
        .header-part1 { color: #FF00FF; } /* Pink/Magenta for PriAxom AI */
        .header-part2 { color: #00FFFF; } /* Blue/Cyan for by Priyam Kesh */
        #header-copyright {
            color: #FF8C00; /* Orange/Yellow */
            font-size: 0.8em;
            margin-top: 5px;
        }

        /* Main Canvas Area (Full Page Center) styling */
        .canvas-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 5; /* Main layer for all other content */
        }

        /* Hide the raw video feed, we use canvases for everything */
        video {
            display: none;
        }

        /* Standard canvas stacking and scaling (mirror effect) */
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            /* Acts like a mirror, which is standard for webcam interaction */
            transform: scaleX(-1);
        }

        /* Pointer Canvas (z-index 6) for black background and robotic pointer */
        #pointerCanvas {
            width: 100%;
            height: 100%;
            z-index: 6; 
        }

        /* Drawing Canvas (z-index 7) for actual drawing, transparent background */
        #drawCanvas {
            width: 100%;
            height: 100%;
            z-index: 7; 
            background-color: transparent;
        }

        /* Footer (Bottom Center) styling */
        #footer {
            padding: 20px;
            width: 100%;
            text-align: center;
            font-family: 'Caveat', cursive; /* Hand-drawn font applied */
            color: #E6E6FA; /* Lavender / Light Blue text */
            font-size: 1.5em;
            position: absolute;
            bottom: 0;
            left: 0;
            z-index: 10; /* Ensures footer stays on top */
        }
    </style>
</head>
<body>

    <div id="header">
        <span id="header-main-text"><span class="header-part1">PriAxom AI</span> <span class="header-part2">by Priyam Kesh</span></span>
        <div id="header-copyright">Under Strict Copyright</div>
    </div>
    
    <div class="canvas-container">
        <video id="webcam" autoplay playsinline></video>
        <canvas id="pointerCanvas"></canvas>
        <canvas id="drawCanvas"></canvas>
    </div>

    <div id="footer">
        Draw with Fingers in AIR
    </div>

    <script>
        const videoElement = document.getElementById('webcam');
        const pointerCanvas = document.getElementById('pointerCanvas');
        const pointerCtx = pointerCanvas.getContext('2d');
        const drawCanvas = document.getElementById('drawCanvas');
        const drawCtx = drawCanvas.getContext('2d');

        // Resizes canvases to fill the central space and keeps pointer canvas black
        function resizeCanvases() {
            const container = document.querySelector('.canvas-container');
            pointerCanvas.width = container.offsetWidth;
            pointerCanvas.height = container.offsetHeight;
            drawCanvas.width = container.offsetWidth;
            drawCanvas.height = container.offsetHeight;
            
            // Re-fill the pointer background (keeps it black even on resize)
            pointerCtx.save();
            pointerCtx.fillStyle = '#000000';
            pointerCtx.fillRect(0, 0, pointerCanvas.width, pointerCanvas.height);
            pointerCtx.restore();
        }
        window.addEventListener('resize', resizeCanvases);
        resizeCanvases(); // Initial call

        // Drawing ink settings: Narrower, Glowing Blue (Updated)
        drawCtx.strokeStyle = '#1E90FF'; // Vibrant Dodger Blue for the core line
        drawCtx.lineWidth = 2; // Made narrower line
        drawCtx.lineCap = 'round';
        drawCtx.shadowBlur = 15; // Increased glow effect
        drawCtx.shadowColor = '#00BFFF'; // Light Deep Sky Blue glow

        let lastX = null;
        let lastY = null;

        function onResults(results) {
            pointerCtx.save();
            // Continuous draw of solid black background to hide video
            pointerCtx.fillStyle = '#000000';
            pointerCtx.fillRect(0, 0, pointerCanvas.width, pointerCanvas.height);

            // Draw the structural robotic pointer hand
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const landmarks = results.multiHandLandmarks[0];

                // High-tech cyan pointer structure drawing
                drawConnectors(pointerCtx, landmarks, HAND_CONNECTIONS, {color: '#00FFFF', lineWidth: 3});
                drawLandmarks(pointerCtx, landmarks, {color: '#FFFFFF', lineWidth: 1, radius: 4});

                // Check for pointing gesture
                const isIndexUp = landmarks[8].y < landmarks[6].y;
                const isMiddleDown = landmarks[12].y > landmarks[10].y;
                const isRingDown = landmarks[16].y > landmarks[14].y;
                const isPinkyDown = landmarks[20].y > landmarks[18].y;

                const isPointing = isIndexUp && isMiddleDown && isRingDown && isPinkyDown;

                if (isPointing) {
                    // Map index fingertip to canvas coords
                    const x = landmarks[8].x * drawCanvas.width;
                    const y = landmarks[8].y * drawCanvas.height;

                    if (lastX !== null && lastY !== null) {
                        // Continuous line drawing
                        drawCtx.beginPath();
                        drawCtx.moveTo(lastX, lastY);
                        drawCtx.lineTo(x, y);
                        drawCtx.stroke();
                    }
                    // Update last position
                    lastX = x;
                    lastY = y;
                } else {
                    // Reset if gesture stops
                    lastX = null;
                    lastY = null;
                }
            } else {
                // Reset if no hand detected
                lastX = null;
                lastY = null;
            }
            pointerCtx.restore();
        }

        // Initialize MediaPipe Hands
        const hands = new Hands({locateFile: (file) => {
            return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
        }});
        
        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 1,
            minDetectionConfidence: 0.6,
            minTrackingConfidence: 0.6
        });
        
        hands.onResults(onResults);

        // Initialize the Webcam
        const camera = new Camera(videoElement, {
            onFrame: async () => {
                await hands.send({image: videoElement});
            },
            width: 640,
            height: 480
        });
        
        camera.start();
    </script>
</body>
</html>
