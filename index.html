<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PriAxom AI Air Drawing</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caveat&display=swap" rel="stylesheet">

    <style>
        body {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: stretch;
            background-color: #000000; 
            height: 100vh;
            margin: 0;
            overflow: hidden; 
            font-family: sans-serif;
        }

        #header {
            padding: 20px;
            font-weight: bold;
            text-align: left;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 10; 
        }

        #header-main-text {
            font-size: 1.5em;
        }

        /* Applied CSS Gradients to Texts */
        .header-part1 { 
            background: linear-gradient(to right, #FF00FF, #FF69B4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        } 
        .header-part2 { 
            background: linear-gradient(to right, #00FFFF, #1E90FF);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        } 
        #header-copyright {
            background: linear-gradient(to right, #FF8C00, #FFD700);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 0.8em;
            margin-top: 5px;
            width: max-content; 
        }

        .canvas-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 5; 
        }

        video { display: none; }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            transform: scaleX(-1); 
        }

        #pointerCanvas {
            width: 100%;
            height: 100%;
            z-index: 6; 
        }

        #drawCanvas {
            width: 100%;
            height: 100%;
            z-index: 7; 
            background-color: transparent;
        }

        #footer {
            padding: 20px;
            width: 100%;
            text-align: center;
            font-family: 'Caveat', cursive; 
            font-size: 1.8em;
            position: absolute;
            bottom: 0;
            left: 0;
            z-index: 10; 
            background: linear-gradient(to right, #8A2BE2, #00BFFF, #00FFFF);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body>

    <div id="header">
        <span id="header-main-text"><span class="header-part1">PriAxom AI</span> <span class="header-part2">by Priyam Kesh</span></span>
        <div id="header-copyright">Under Strict Copyright</div>
    </div>
    
    <div class="canvas-container">
        <video id="webcam" autoplay playsinline></video>
        <canvas id="pointerCanvas"></canvas>
        <canvas id="drawCanvas"></canvas>
    </div>

    <div id="footer">
        Draw with Fingers in AIR
    </div>

    <script>
        const videoElement = document.getElementById('webcam');
        const pointerCanvas = document.getElementById('pointerCanvas');
        const pointerCtx = pointerCanvas.getContext('2d');
        const drawCanvas = document.getElementById('drawCanvas');
        const drawCtx = drawCanvas.getContext('2d');

        function resizeCanvases() {
            const container = document.querySelector('.canvas-container');
            pointerCanvas.width = container.offsetWidth;
            pointerCanvas.height = container.offsetHeight;
            drawCanvas.width = container.offsetWidth;
            drawCanvas.height = container.offsetHeight;
        }
        window.addEventListener('resize', resizeCanvases);
        resizeCanvases(); 

        let lastX = null;
        let lastY = null;

        function onResults(results) {
            pointerCtx.save();
            pointerCtx.fillStyle = '#000000';
            pointerCtx.fillRect(0, 0, pointerCanvas.width, pointerCanvas.height);

            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const landmarks = results.multiHandLandmarks[0];

                drawConnectors(pointerCtx, landmarks, HAND_CONNECTIONS, {color: '#00FFFF', lineWidth: 3});
                drawLandmarks(pointerCtx, landmarks, {color: '#FFFFFF', lineWidth: 1, radius: 4});

                const isIndexUp = landmarks[8].y < landmarks[6].y;
                const isMiddleDown = landmarks[12].y > landmarks[10].y;
                const isRingDown = landmarks[16].y > landmarks[14].y;
                const isPinkyDown = landmarks[20].y > landmarks[18].y;

                const isPointing = isIndexUp && isMiddleDown && isRingDown && isPinkyDown;

                if (isPointing) {
                    const x = landmarks[8].x * drawCanvas.width;
                    const y = landmarks[8].y * drawCanvas.height;

                    if (lastX !== null && lastY !== null) {
                        // FIX: Re-declare context settings explicitly before every stroke 
                        // to prevent data loss upon window/canvas resize.
                        drawCtx.strokeStyle = '#00FFFF'; // Glowing Cyan/Blue
                        drawCtx.lineWidth = 4;           // Narrow but highly recognizable
                        drawCtx.lineCap = 'round';
                        drawCtx.shadowBlur = 12;
                        drawCtx.shadowColor = '#1E90FF';

                        drawCtx.beginPath();
                        drawCtx.moveTo(lastX, lastY);
                        drawCtx.lineTo(x, y);
                        drawCtx.stroke();
                    }
                    lastX = x;
                    lastY = y;
                } else {
                    lastX = null;
                    lastY = null;
                }
            } else {
                lastX = null;
                lastY = null;
            }
            pointerCtx.restore();
        }

        const hands = new Hands({locateFile: (file) => {
            return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
        }});
        
        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 1,
            minDetectionConfidence: 0.6,
            minTrackingConfidence: 0.6
        });
        
        hands.onResults(onResults);

        const camera = new Camera(videoElement, {
            onFrame: async () => {
                await hands.send({image: videoElement});
            },
            width: 640,
            height: 480
        });
        
        camera.start();
    </script>
</body>
</html>
