<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PriAxom AIR Pro</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">

    <style>
        body { display: flex; flex-direction: column; justify-content: space-between; align-items: stretch; background-color: #000000; height: 100vh; margin: 0; overflow: hidden; font-family: 'Poppins', sans-serif; user-select: none; }
        
        #header { padding: 20px; text-align: left; position: absolute; top: 0; left: 0; z-index: 10; pointer-events: none; }
        #gradient-header-text { font-size: 1.8em; font-weight: 700; background: linear-gradient(to right, #4285F4, #8A2BE2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; display: block; width: max-content; letter-spacing: -0.5px; }
        #header-copyright { background: linear-gradient(to right, #FF8C00, #FFD700); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-size: 0.85em; margin-top: 2px; width: max-content; font-weight: 700; }
        #author-name { color: #888; font-size: 0.75em; font-weight: 400; margin-top: 2px; }
        
        .canvas-container { position: relative; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; z-index: 5; }
        
        /* FIX: Opacity 0 prevents mobile browsers from putting the camera to sleep */
        video { position: absolute; opacity: 0; z-index: -1; pointer-events: none; }
        
        /* AI handles mirroring now, no CSS scaleX(-1) needed */
        canvas { position: absolute; top: 0; left: 0; }
        
        #pointerCanvas { width: 100%; height: 100%; z-index: 6; }
        #drawCanvas { width: 100%; height: 100%; z-index: 7; background-color: transparent; }
    </style>
</head>
<body>
    <div id="header">
        <span id="gradient-header-text">PriAxom AIR©</span>
        <div id="header-copyright">Stable Kinematic Engine</div>
        <div id="author-name">by Priyam Kesh</div>
    </div>
    
    <div class="canvas-container">
        <video id="webcam" autoplay playsinline></video>
        <canvas id="pointerCanvas"></canvas>
        <canvas id="drawCanvas"></canvas>
    </div>

    <script>
        "use strict"; 

        // FAST MATH
        const distSq = (x1, y1, x2, y2) => (x1 - x2) ** 2 + (y1 - y2) ** 2;

        const videoElement = document.getElementById('webcam');
        const pointerCanvas = document.getElementById('pointerCanvas');
        const pointerCtx = pointerCanvas.getContext('2d', { alpha: false, desynchronized: true }); 
        const drawCanvas = document.getElementById('drawCanvas');
        const drawCtx = drawCanvas.getContext('2d', { desynchronized: true });

        let cvsW = 0, cvsH = 0;
        function resizeCanvases() {
            const container = document.querySelector('.canvas-container');
            cvsW = pointerCanvas.width = drawCanvas.width = container.offsetWidth;
            cvsH = pointerCanvas.height = drawCanvas.height = container.offsetHeight;
        }
        window.addEventListener('resize', resizeCanvases);
        resizeCanvases(); 

        let activeColor = '#00FFFF', activeGlow = '#1E90FF';

        class Stroke {
            constructor() {
                this.points = []; this.selected = false;
                this.bounds = { minX: 99999, maxX: -99999, minY: 99999, maxY: -99999 };
                this.cachedPath = null; this.isDirty = true;
                this.color = activeColor; this.glow = activeGlow;
            }
            addPoint(x, y) {
                if (this.points.length > 0) {
                    const lastPt = this.points[this.points.length - 1];
                    const d = distSq(x, y, lastPt.x, lastPt.y);
                    if (d > 30000) return false; 
                    if (d < 4) return true;      
                }
                this.points.push({x, y});
                if (x < this.bounds.minX) this.bounds.minX = x; if (x > this.bounds.maxX) this.bounds.maxX = x;
                if (y < this.bounds.minY) this.bounds.minY = y; if (y > this.bounds.maxY) this.bounds.maxY = y;
                this.isDirty = true;
                return true;
            }
            getRenderPath() {
                if (!this.isDirty && this.cachedPath) return this.cachedPath;
                let p = new Path2D();
                const len = this.points.length;
                if (len > 0) {
                    p.moveTo(this.points[0].x, this.points[0].y);
                    for (let i = 1; i < len - 1; i++) {
                        p.quadraticCurveTo(this.points[i].x, this.points[i].y, (this.points[i].x + this.points[i + 1].x) * 0.5, (this.points[i].y + this.points[i + 1].y) * 0.5);
                    }
                    if (len > 1) p.lineTo(this.points[len - 1].x, this.points[len - 1].y);
                }
                this.cachedPath = p; this.isDirty = false; return p;
            }
        }

        let strokes = []; 
        let globalResults = null;

        const createHandState = () => ({
            currentStroke: null, grabbedStrokeIndex: -1, lastPinchPos: null, isSelecting: false, selStart: null, selCurrent: null, 
            smoothX: 0, smoothY: 0, initialized: false
        });
        const handStates = [createHandState(), createHandState()];

        // THREAD 1: AI CALLBACK (Data Collection Only)
        function onResults(results) {
            globalResults = results;
        }

        // THREAD 2: 60FPS GRAPHICS ENGINE (Independent of AI Speed)
        function renderEngine() {
            requestAnimationFrame(renderEngine);
            
            pointerCtx.save(); 
            pointerCtx.fillStyle = '#000000'; 
            pointerCtx.fillRect(0, 0, cvsW, cvsH);
            drawCtx.clearRect(0, 0, cvsW, cvsH);

            if (globalResults && globalResults.multiHandLandmarks) {
                const numHands = globalResults.multiHandLandmarks.length;

                for (let i = 0; i < 2; i++) {
                    const state = handStates[i];

                    if (i >= numHands) {
                        state.currentStroke = null; state.grabbedStrokeIndex = -1; state.lastPinchPos = null; state.initialized = false;
                        if (state.isSelecting) finalizeSelection(state);
                        continue;
                    }

                    const lm = globalResults.multiHandLandmarks[i];
                    drawConnectors(pointerCtx, lm, HAND_CONNECTIONS, {color: '#00FFFF', lineWidth: 2});
                    drawLandmarks(pointerCtx, lm, {color: '#FFFFFF', lineWidth: 1, radius: 2});

                    const thumbX = lm[4].x * cvsW, thumbY = lm[4].y * cvsH;
                    const rawIdxX = lm[8].x * cvsW, rawIdxY = lm[8].y * cvsH;
                    const midX = lm[12].x * cvsW, midY = lm[12].y * cvsH;
                    
                    if (!state.initialized) { state.smoothX = rawIdxX; state.smoothY = rawIdxY; state.initialized = true; }

                    state.smoothX += (rawIdxX - state.smoothX) * 0.4;
                    state.smoothY += (rawIdxY - state.smoothY) * 0.4;
                    const idxX = state.smoothX, idxY = state.smoothY;

                    const iUp = lm[8].y < lm[6].y, mUp = lm[12].y < lm[10].y, rUp = lm[16].y < lm[14].y, pUp = lm[20].y < lm[18].y;
                    const thumbFolded = distSq(lm[4].x, lm[4].y, lm[17].x, lm[17].y) < distSq(lm[3].x, lm[3].y, lm[17].x, lm[17].y);
                    const pDistSq = distSq(thumbX, thumbY, rawIdxX, rawIdxY);

                    let actState = 'idle';
                    if (pDistSq < 2000) actState = 'pinching'; 
                    else if (thumbFolded && iUp && mUp && rUp && pUp) actState = 'selecting';
                    else if (iUp && mUp && !rUp && !pUp) actState = 'erasing';
                    else if (iUp && !mUp && !rUp && !pUp) actState = 'drawing';

                    if (actState === 'drawing') {
                        pointerCtx.fillStyle = activeColor; pointerCtx.beginPath(); pointerCtx.arc(idxX, idxY, 8, 0, Math.PI*2); pointerCtx.fill();
                        if (!state.currentStroke) {
                            state.currentStroke = new Stroke(); state.currentStroke.addPoint(idxX, idxY); strokes.push(state.currentStroke);
                        } else {
                            const valid = state.currentStroke.addPoint(idxX, idxY);
                            if (!valid) { state.currentStroke = new Stroke(); state.currentStroke.addPoint(idxX, idxY); strokes.push(state.currentStroke); }
                        }
                    } else { state.currentStroke = null; }

                    if (actState === 'selecting') {
                        const ax = (idxX + midX + lm[16].x*cvsW + lm[20].x*cvsW) * 0.25; const ay = (idxY + midY + lm[16].y*cvsH + lm[20].y*cvsH) * 0.25;
                        if (!state.isSelecting) { state.isSelecting = true; state.selStart = {x: ax, y: ay}; }
                        state.selCurrent = {x: ax, y: ay};
                        pointerCtx.strokeStyle = '#FFFF00'; pointerCtx.lineWidth = 2; pointerCtx.setLineDash([10, 10]);
                        pointerCtx.strokeRect(state.selStart.x, state.selStart.y, ax - state.selStart.x, ay - state.selStart.y);
                        pointerCtx.setLineDash([]);
                    } else if (state.isSelecting) finalizeSelection(state);

                    if (actState === 'erasing') {
                        const cx = (idxX + midX) * 0.5, cy = (idxY + midY) * 0.5, rSq = 1600; 
                        pointerCtx.fillStyle = '#FF0044'; pointerCtx.beginPath(); pointerCtx.arc(cx, cy, 40, 0, Math.PI*2); pointerCtx.fill();

                        let nStrokes = [];
                        for (let s of strokes) {
                            if (cx+40 < s.bounds.minX || cx-40 > s.bounds.maxX || cy+40 < s.bounds.minY || cy-40 > s.bounds.maxY) { nStrokes.push(s); continue; }
                            let ns = new Stroke(); ns.color = s.color; ns.glow = s.glow;
                            for (let pt of s.points) {
                                if (distSq(pt.x, pt.y, cx, cy) < rSq) {
                                    if (ns.points.length > 1) nStrokes.push(ns);
                                    ns = new Stroke(); ns.color = s.color; ns.glow = s.glow;
                                } else ns.addPoint(pt.x, pt.y);
                            }
                            if (ns.points.length > 1) nStrokes.push(ns);
                        }
                        strokes = nStrokes;
                    }

                    if (actState === 'pinching') {
                        const px = (thumbX + rawIdxX) * 0.5, py = (thumbY + rawIdxY) * 0.5;
                        pointerCtx.strokeStyle = '#00FF00'; pointerCtx.lineWidth = 3; pointerCtx.beginPath(); pointerCtx.moveTo(thumbX, thumbY); pointerCtx.lineTo(rawIdxX, rawIdxY); pointerCtx.stroke();
                        pointerCtx.fillStyle = '#00FF00'; pointerCtx.beginPath(); pointerCtx.arc(px, py, 8, 0, Math.PI*2); pointerCtx.fill();

                        if (strokes.some(s => s.selected)) {
                            if (state.lastPinchPos) {
                                const dx = px - state.lastPinchPos.x, dy = py - state.lastPinchPos.y;
                                strokes.forEach(s => { if (s.selected) { s.points.forEach(pt => { pt.x += dx; pt.y += dy; }); } });
                            }
                        } else {
                            if (state.grabbedStrokeIndex === -1) {
                                let cDist = 999999, cIdx = -1;
                                for (let j = 0; j < strokes.length; j++) {
                                    const b = strokes[j].bounds;
                                    if (px < b.minX-60 || px > b.maxX+60 || py < b.minY-60 || py > b.maxY+60) continue;
                                    for (let pt of strokes[j].points) {
                                        const d = distSq(pt.x, pt.y, px, py);
                                        if (d < 3600 && d < cDist) { cDist = d; cIdx = j; } 
                                    }
                                }
                                if (cIdx !== -1) state.grabbedStrokeIndex = cIdx;
                            } else {
                                if (state.lastPinchPos && strokes[state.grabbedStrokeIndex]) {
                                    const dx = px - state.lastPinchPos.x, dy = py - state.lastPinchPos.y;
                                    strokes[state.grabbedStrokeIndex].points.forEach(pt => { pt.x += dx; pt.y += dy; });
                                }
                            }
                        }
                        state.lastPinchPos = { x: px, y: py };
                    } else { state.grabbedStrokeIndex = -1; state.lastPinchPos = null; }
                }
            } else {
                handStates[0].currentStroke = null; handStates[0].initialized = false;
                handStates[1].currentStroke = null; handStates[1].initialized = false;
            }
            
            pointerCtx.restore();

            // RENDER PATHS TO SCREEN
            drawCtx.lineCap = drawCtx.lineJoin = 'round';
            let cColor = '', cGlow = '', cWidth = 0;

            for (let i = 0; i < strokes.length; i++) {
                const s = strokes[i];
                if (s.points.length < 2) continue;
                
                const tgtColor = s.selected ? '#FFFF00' : s.color;
                const tgtGlow = s.selected ? '#FFD700' : s.glow;
                const tgtWidth = s.selected ? 6 : 4;

                if (cColor !== tgtColor) { drawCtx.strokeStyle = cColor = tgtColor; }
                if (cGlow !== tgtGlow) { drawCtx.shadowColor = cGlow = tgtGlow; }
                if (cWidth !== tgtWidth) { drawCtx.lineWidth = cWidth = tgtWidth; drawCtx.shadowBlur = s.selected ? 10 : 5; }

                drawCtx.stroke(s.getRenderPath());
            }
        }

        function finalizeSelection(sObj) {
            sObj.isSelecting = false;
            const mx = Math.min(sObj.selStart.x, sObj.selCurrent.x), Mx = Math.max(sObj.selStart.x, sObj.selCurrent.x);
            const my = Math.min(sObj.selStart.y, sObj.selCurrent.y), My = Math.max(sObj.selStart.y, sObj.selCurrent.y);
            strokes.forEach(s => {
                s.selected = !(s.bounds.maxX < mx || s.bounds.minX > Mx || s.bounds.maxY < my || s.bounds.minY > My) && s.points.some(p => p.x >= mx && p.x <= Mx && p.y >= my && p.y <= My);
            });
        }

        // --- FOOLPROOF CAMERA INITIALIZATION ---
        const hands = new Hands({locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`});
        
        hands.setOptions({ 
            maxNumHands: 2, 
            modelComplexity: 0, 
            minDetectionConfidence: 0.5, 
            minTrackingConfidence: 0.5,
            selfieMode: true // Handled natively by AI
        });
        
        hands.onResults(onResults);

        // Using Google's official Camera Utility to guarantee stable connection on all devices
        const camera = new Camera(videoElement, {
            onFrame: async () => {
                await hands.send({image: videoElement});
            },
            width: 480,  // Lightweight resolution for zero thermal throttling
            height: 360,
            facingMode: 'user'
        });
        
        camera.start();
        requestAnimationFrame(renderEngine);

        // VOICE ENGINE
        const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SR) {
            const rcg = new SR(); rcg.continuous = true; rcg.interimResults = true; rcg.lang = 'en-US';
            let lastSaveTime = 0;
            rcg.onresult = (e) => {
                for (let i = e.resultIndex; i < e.results.length; ++i) {
                    const t = e.results[i][0].transcript.trim().toLowerCase();
                    if (t.includes('clear')) { strokes = []; } 
                    else if (t.includes('save') && Date.now() - lastSaveTime > 2000) {
                        lastSaveTime = Date.now();
                        const tc = document.createElement('canvas'); tc.width = cvsW; tc.height = cvsH; const tCtx = tc.getContext('2d');
                        tCtx.fillStyle = '#000000'; tCtx.fillRect(0, 0, cvsW, cvsH); tCtx.lineCap = tCtx.lineJoin = 'round';
                        for (let s of strokes) {
                            if(s.points.length < 2) continue;
                            tCtx.strokeStyle = s.selected ? '#FFFF00' : s.color; tCtx.shadowColor = s.selected ? '#FFD700' : s.glow;
                            tCtx.lineWidth = s.selected ? 6 : 4; tCtx.shadowBlur = s.selected ? 10 : 5; tCtx.stroke(s.getRenderPath());
                        }
                        const a = document.createElement('a'); a.href = tc.toDataURL('image/png'); a.download = 'PriAxom_AIR_Pro.png';
                        document.body.appendChild(a); a.click(); document.body.removeChild(a);
                    }
                    else if (t.includes('red')) { activeColor = '#FF0000'; activeGlow = '#DC143C'; }
                    else if (t.includes('green')) { activeColor = '#00FF00'; activeGlow = '#32CD32'; }
                    else if (t.includes('white')) { activeColor = '#FFFFFF'; activeGlow = '#AAAAAA'; }
                    else if (t.includes('blue')) { activeColor = '#00FFFF'; activeGlow = '#1E90FF'; }
                    else if (t.includes('purple')) { activeColor = '#FF00FF'; activeGlow = '#8A2BE2'; }
                }
            };
            rcg.onend = () => { try { rcg.start(); } catch(e) {} }; rcg.start();
        }
    </script>
</body>
</html>
